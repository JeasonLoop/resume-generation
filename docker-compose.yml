version: '3.8'

services:
  # 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-generation-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_PATH=/var/www/resume-generation/data
      - NODE_OPTIONS=--max-old-space-size=512
    volumes:
      # 持久化数据库
      - resume-data:/var/www/resume-generation/data
      # 持久化上传文件
      - resume-uploads:/app/api/uploads
    networks:
      - resume-network
    # 端口映射（Nginx 需要访问）
    ports:
      - "3001:3001"
    # 资源限制（适配2核2G轻量服务器）
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1200M
        reservations:
          cpus: '0.5'
          memory: 600M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 60s

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: resume-generation-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - resume-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - resume-network
    # 资源限制（Nginx占用资源较少）
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

# 数据卷定义
volumes:
  resume-data:
    driver: local
  resume-uploads:
    driver: local
  resume-logs:
    driver: local

# 网络定义
networks:
  resume-network:
    driver: bridge
